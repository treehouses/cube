name: Build Image

on:
  workflow_dispatch:
  repository_dispatch:
  push:
    branches:
      - "main"
      - "4-additional-ubuntu-build"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install coreutils p7zip-full qemu-user-static

    - name: Checkout UbuntuDockerPi
      uses: actions/checkout@v3
      with:
        repository: 'guysoft/UbuntuDockerPi'
        path: UbuntuDockerPi

    - name: Checkout Project Repository
      uses: actions/checkout@v3
      with:
        path: repository
        submodules: true

    - name: Download UbuntuServer ARM64 Image
      run: |
        cd repository/src/image
        wget -c --trust-server-names 'https://cdimage.ubuntu.com/releases/22.04.1/release/ubuntu-22.04.1-preinstalled-server-arm64+raspi.img.xz?_ga=2.48032359.1126913943.1665588933-1544925709.1635958768'

    - name: Update CustomPiOS Paths
      run: |
        cd repository/src
        ../../CustomPiOS/src/update-custompios-paths

    - name: Build Image
      run: |
        sudo modprobe loop
        cd repository/src
        sudo bash -x ./build_dist

    - name: Copy output
      id: copy
      run: |
        source repository/src/config
        NOW=$(date +"%Y-%m-%d-%H%M")
        IMAGE=$NOW-cube-$DIST_VERSION
        cp repository/src/workspace/*.img $IMAGE.img
        gzip $IMAGE.img
        sync; sync; sync
        echo "::set-output name=image::$IMAGE"

    - uses: actions/upload-artifact@v1
      with:
        name: ${{ steps.copy.outputs.image }}
        path: ${{ steps.copy.outputs.image }}.img.gz
